<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ADHD Simulation — Understanding Learning Disabilities</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .sim-adhd-page {
      background: #F2F6FA;
      min-height: 100vh;
      overflow: hidden;
    }

    .sim-adhd-page .sim-fullscreen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px 500px;
      overflow: hidden;
    }

    .sim-adhd-page .sim-stage {
      position: relative;
      width: min(1100px, 92vw);
      min-height: 75vh;
      height: min(720px, 80vh);
    }

    .sim-adhd-page #task-container {
      position: relative;
      width: 100%;
      height: 100%;
      background: #F7F6F2;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(15, 25, 40, 0.08);
      border: 1px solid rgba(15, 25, 40, 0.08);
      overflow: hidden;
    }

    .sim-adhd-page .task-content {
      position: absolute;
      inset: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    .sim-adhd-page .task-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e2a35;
      margin: 0;
    }

    .sim-adhd-page .question-card {
      background: rgba(255, 255, 255, 0.95);
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(15, 25, 40, 0.08);
      max-width: 600px;
      width: 100%;
    }

    .sim-adhd-page.pre-start .question-card {
      opacity: 0;
      visibility: hidden;
    }

    .sim-adhd-page .question-text {
      font-size: 1.1rem;
      color: #1e2a35;
      margin: 0 0 24px 0;
      text-align: center;
      line-height: 1.5;
    }

    .sim-adhd-page .answer-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .sim-adhd-page .answer-btn {
      appearance: none;
      border: 2px solid rgba(15, 25, 40, 0.12);
      background: #fff;
      color: #1e2a35;
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    .sim-adhd-page .answer-btn:hover {
      background: #f0f0f0;
      border-color: rgba(15, 25, 40, 0.2);
    }

    .sim-adhd-page .sim-start-overlay {
      position: absolute;
      inset: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.18);
    }

    .sim-adhd-page .sim-start-card {
      background: rgba(255, 255, 255, 0.95);
      color: #1e2a35;
      border-radius: 16px;
      padding: 20px 24px;
      box-shadow: 0 12px 28px rgba(15, 25, 40, 0.18);
      max-width: min(520px, 88vw);
      text-align: center;
    }

    .sim-adhd-page .sim-start-card h2 {
      margin: 0 0 12px 0;
      font-size: 1.4rem;
    }

    .sim-adhd-page .sim-start-card p {
      margin: 8px 0 0 0;
      font-size: 0.95rem;
      color: #2a3a48;
    }

    .sim-adhd-page .sim-start-btn {
      appearance: none;
      border: none;
      background: #1e2a35;
      color: #fff;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    .sim-adhd-page .sim-hud {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(20px + env(safe-area-inset-bottom));
      z-index: 4;
      background: rgba(255, 255, 255, 0.92);
      color: #1e2a35;
      padding: 10px 14px;
      border-radius: 14px;
      box-shadow: 0 8px 20px rgba(15, 25, 40, 0.14);
      max-width: min(900px, 94vw);
    }

    .sim-adhd-page .sim-hud .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .sim-adhd-page .sim-hud .btn {
      appearance: none;
      border: 1px solid rgba(15, 25, 40, 0.15);
      background: #fff;
      color: #1e2a35;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }

    .sim-adhd-page .sim-hud select {
      padding-right: 28px;
      background-image: url('data:image/svg+xml;utf-8,<svg xmlns="http://www.w3.org/2000/svg" width="12" height="8" viewBox="0 0 12 8"><path fill="%230B6CD4" d="M1 1l5 5 5-5" stroke="%230B6CD4" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>');
      background-repeat: no-repeat;
      background-position: right 8px center;
    }

    .sim-adhd-page .sim-hud .btn[disabled] {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .sim-adhd-page .sim-back {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 3;
      background: rgba(255, 255, 255, 0.9);
      color: #1e2a35;
      border: 1px solid rgba(15, 25, 40, 0.12);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 0.85rem;
      text-decoration: none;
      box-shadow: 0 6px 16px rgba(15, 25, 40, 0.12);
    }

    .sim-adhd-page .sim-reflection {
      width: min(900px, 92vw);
      margin: 0;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 6;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(15, 25, 40, 0.1);
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 8px 22px rgba(15, 25, 40, 0.12);
      color: #1e2a35;
    }

    .sim-adhd-page .sim-reflection h3 {
      margin: 0 0 10px 0;
      font-size: 1.2rem;
    }

    .sim-adhd-page .sim-reflection p {
      margin: 0 0 10px 0;
      font-size: 0.98rem;
      line-height: 1.5;
      color: #2a3a48;
    }

    /* Toast notifications */
    .sim-adhd-page .toast-layer {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-width: 320px;
      pointer-events: none;
    }

    .sim-adhd-page .toast {
      background: rgba(255, 255, 255, 0.98);
      color: #1e2a35;
      padding: 16px 20px;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(15, 25, 40, 0.16);
      border: 1px solid rgba(15, 25, 40, 0.1);
      font-size: 1.05rem;
      line-height: 1.4;
      animation: slideIn 0.3s ease-out;
      pointer-events: auto;
    }

    .sim-adhd-page.sim-shake {
      animation: simShake 0.25s ease;
    }

    @keyframes simShake {
      0% { transform: translateX(0); }
      20% { transform: translateX(-2px); }
      40% { transform: translateX(2px); }
      60% { transform: translateX(-1px); }
      80% { transform: translateX(1px); }
      100% { transform: translateX(0); }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(100%);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Interruption modal */
    .sim-adhd-page .interrupt-overlay {
      position: fixed;
      inset: 0;
      z-index: 10;
      background: rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .sim-adhd-page .interrupt-card {
      background: rgba(255, 255, 255, 0.98);
      color: #1e2a35;
      border-radius: 16px;
      padding: 24px 28px;
      box-shadow: 0 12px 32px rgba(15, 25, 40, 0.24);
      max-width: min(480px, 88vw);
      text-align: center;
    }

    .sim-adhd-page .interrupt-card h2 {
      margin: 0 0 12px 0;
      font-size: 1.3rem;
      color: #1e2a35;
    }

    .sim-adhd-page .interrupt-card p {
      margin: 0 0 20px 0;
      font-size: 1rem;
      color: #2a3a48;
      line-height: 1.5;
    }

    /* Task-switching friction effects */
    .sim-adhd-page .task-blur {
      filter: blur(4px);
      opacity: 0.7;
      transition: filter 0.4s ease-out, opacity 0.4s ease-out;
    }

    .sim-adhd-page .question-highlight {
      outline: 2px solid rgba(192, 130, 97, 0.5);
      outline-offset: 4px;
      background: rgba(199, 111, 97, 0.04);
      border-radius: 8px;
      transition: outline 0.3s ease-out, background 0.3s ease-out;
    }

    @media (max-width: 640px) {
      .sim-adhd-page .sim-hud {
        padding: 8px 10px;
        border-radius: 12px;
        font-size: 0.9rem;
      }

      .sim-adhd-page .sim-hud .btn {
        padding: 6px 10px;
        font-size: 0.85rem;
      }

      .sim-adhd-page .question-card {
        padding: 24px;
      }

      .sim-adhd-page .question-text {
        font-size: 1.1rem;
      }

      .sim-adhd-page .task-title {
        font-size: 1.5rem;
      }

      .sim-adhd-page .toast-layer {
        top: 10px;
        right: 10px;
        max-width: 280px;
      }

      .sim-adhd-page .toast {
        font-size: 0.85rem;
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body class="dark-site sim-adhd-page">

  <main class="content sim-fullscreen">
    <div class="sim-stage">
      <div id="task-container">
        <div class="task-content">        
          <div class="question-card">
            <p id="question-text" class="question-text"></p>
            <div id="answer-buttons" class="answer-buttons"></div>
          </div>
        </div>
      </div>

      <div id="startOverlay" class="sim-start-overlay" role="dialog" aria-modal="true" aria-label="Start simulation">
        <div class="sim-start-card">
          <button id="startBtn" class="sim-start-btn">Start</button>
          <p>Click to start the classroom task.</p>
          <p>Answer the questions to the best of your ability.</p>
        </div>
      </div>

    </div>
  </main>

  <!-- Toast notification layer -->
  <div id="toastLayer" class="toast-layer" aria-live="polite"></div>

  <!-- Interruption modal overlay -->
  <div id="interruptOverlay" class="interrupt-overlay" style="display:none">
    <div class="interrupt-card">
      <h2>Quick interruption</h2>
      <p id="interruptText">...</p>
      <button id="dismissInterruptBtn" class="btn">Dismiss</button>
    </div>
  </div>

  <div id="simHud" class="sim-hud" role="group" aria-label="Simulation controls">
    <div class="controls">
      <button id="pauseBtn" class="btn">Pause</button>
      <button id="resetBtn" class="btn">Reset</button>

      <label style="display:flex;align-items:center;gap:8px;">
        Intensity
        <select id="intensitySelect" class="btn">
          <option value="mild">Mild</option>
          <option value="moderate">Moderate</option>
          <option value="strong">Strong</option>
        </select>
      </label>
    </div>
  </div>

  <section id="reflectionCard" class="sim-reflection" hidden>
    <h3>Reflection</h3>
     <p>hello world</p>
  </section>

  <a class="sim-back" href="simulations.html">Back</a>

  <!-- Background audio -->
  <audio id="adhdAmbientAudio" loop preload="auto">
    <source src="js/freesound_community-030264_classroom-ambience-69656.mp3" type="audio/mpeg">
  </audio>

  <script src="js/sim-adhd.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof setup === 'function') {
        setup();
      }
    });
  </script>
  <script src="js/site.js"></script>
</body>
</html>
